name: Build EPG (Daily)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install requests

      - name: Build channels.xml from playlist
        run: python scripts/channels_xml_builder.py

      - name: Clone iptv-org/epg grabber
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git epg-grabber
          echo "Cloned iptv-org/epg successfully"

      - name: Install EPG grabber dependencies
        run: |
          cd epg-grabber
          npm install --prefer-offline --no-audit --no-fund
          echo "npm install complete"

      - name: Run EPG grabber with memory limit
        run: |
          cd epg-grabber
          node --max-old-space-size=3072 node_modules/.bin/epg-grabber \
            --channels=../channels.xml \
            --output=../output/merged_epg.xml \
            --timeout=5000 \
            --concurrency=1
          echo "EPG grab complete"

      - name: Verify output file
        run: |
          if [ -f "output/merged_epg.xml" ]; then
            SIZE=$(du -sh output/merged_epg.xml | cut -f1)
            echo "✓ merged_epg.xml generated — size: $SIZE"
          else
            echo "✗ merged_epg.xml not found — aborting"
            exit 1
          fi

      - name: Commit and push output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/merged_epg.xml
          git diff --staged --quiet || git commit -m "📺 Auto-update EPG [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin main
