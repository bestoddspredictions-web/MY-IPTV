name: Build EPG (Daily)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install requests

      - name: Ensure output directory exists
        run: mkdir -p $GITHUB_WORKSPACE/output

      - name: Build channels.xml from playlist
        run: python scripts/channels_xml_builder.py

      - name: Validate channels.xml has content
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/channels.xml" ]; then
            echo "✗ channels.xml not found"
            exit 1
          fi
          COUNT=$(grep -c "<channel" $GITHUB_WORKSPACE/channels.xml || true)
          echo "✓ channels.xml has $COUNT channel entries"
          if [ "$COUNT" -eq "0" ]; then
            echo "✗ channels.xml is empty"
            exit 1
          fi

      - name: Clone iptv-org/epg grabber
        run: |
          git clone --depth 1 https://github.com/iptv-org/epg.git $GITHUB_WORKSPACE/epg-grabber
          echo "✓ Cloned iptv-org/epg"

      - name: Install EPG grabber dependencies
        run: |
          cd $GITHUB_WORKSPACE/epg-grabber
          npm install --prefer-offline --no-audit --no-fund
          echo "✓ npm install complete"

      - name: Find grabber entry point
        run: |
          cd $GITHUB_WORKSPACE/epg-grabber
          # Find the actual grab script entry point
          GRAB_SCRIPT=$(node -e "const p=require('./package.json'); const s=p.scripts&&p.scripts.grab; console.log(s||'')" 2>/dev/null || echo "")
          echo "Grab script: $GRAB_SCRIPT"
          # Find main JS file
          ls src/ 2>/dev/null || true
          ls scripts/ 2>/dev/null || true
          cat package.json | grep -A5 '"scripts"'

      - name: Run EPG grabber with explicit node memory
        run: |
          cd $GITHUB_WORKSPACE/epg-grabber

          # Export memory setting for all node processes
          export NODE_OPTIONS="--max-old-space-size=5120"

          # Run via npm with triple dash separator
          npm run grab --- \
            --channels=$GITHUB_WORKSPACE/channels.xml \
            --output=$GITHUB_WORKSPACE/output/merged_epg.xml \
            --timeout=10000 \
            --maxConnections=1 \
            --days=1

          echo "✓ EPG grab complete"

      - name: Validate merged_epg.xml
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/output/merged_epg.xml" ]; then
            echo "✗ merged_epg.xml not found"
            exit 1
          fi
          SIZE=$(du -sh $GITHUB_WORKSPACE/output/merged_epg.xml | cut -f1)
          CHANNELS=$(grep -c "<channel" $GITHUB_WORKSPACE/output/merged_epg.xml || true)
          PROGRAMMES=$(grep -c "<programme" $GITHUB_WORKSPACE/output/merged_epg.xml || true)
          echo "✓ Size: $SIZE | Channels: $CHANNELS | Programmes: $PROGRAMMES"
          if [ "$CHANNELS" -eq "0" ] && [ "$PROGRAMMES" -eq "0" ]; then
            echo "✗ EPG file has no data"
            exit 1
          fi

      - name: Commit and push output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add $GITHUB_WORKSPACE/output/merged_epg.xml
          git diff --staged --quiet || git commit -m "📺 Auto-update EPG [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin main
