name: MBC Channels Fetch

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  fetch-mbc:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install playwright requests

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run MBC fetcher
        run: python scripts/mbc_fetcher.py

      - name: Show results
        run: |
          echo "=== LOG ==="
          cat output/mbc_fetch_log.json || echo "No log"
          echo ""
          echo "=== PLAYLIST PREVIEW ==="
          head -80 output/mbc_channels.m3u || echo "No playlist generated"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/mbc_channels.m3u output/mbc_fetch_log.json || true
          git diff --staged --quiet || git commit -m "chore: update MBC channels [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
