name: Build Playlist

on:
  schedule:
    - cron: "0 2 * * 0"  # Weekly Sunday 02:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Build main playlist
        run: python scripts/playlist_builder.py

      - name: Merge MBC channels into main playlist
        run: python scripts/playlist_merger.py

      - name: Show summary
        run: |
          echo "=== PLAYLIST STATS ==="
          grep -c "#EXTINF" output/merged_channels.m3u || echo "0 channels"
          echo ""
          echo "=== MBC CHANNELS IN MERGED ==="
          grep -i "mbc" output/merged_channels.m3u | grep "#EXTINF" || echo "No MBC channels"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/merged_channels.m3u || true
          git diff --staged --quiet || git commit -m "chore: rebuild playlist [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
